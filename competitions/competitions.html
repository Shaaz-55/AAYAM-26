<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atomic Competitions</title>
    <link rel="stylesheet" href="competitions.css">
</head>

<body>
    <!-- Background Canvas for Grain/Noise -->
    <canvas id="bg-canvas"></canvas>

    <!-- Main Scene Container -->
    <div id="scene" class="scene">
        <div class="atom-container">
            <!-- Orbital Rings -->
            <div id="orbits-container" class="orbit-group">
                <!-- Orbits and images will be generated via JS for cleaner math -->
            </div>

            <!-- Central Nucleus -->
            <div id="nucleus" class="nucleus"></div>
        </div>
    </div>

    <!-- Final 4x4 Grid Container (Hidden initially) -->
    <div id="grid-container" class="grid-container hidden">
        <!-- Grid items generated by JS when burst finishes -->
    </div>

    <!-- Reset Button -->
    <button id="reset-btn" class="reset-btn hidden">← Reset</button>

    <script src="competitions.js"></script>
</body>

</html>
